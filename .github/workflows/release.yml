name: Release Skills

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag name
        id: get_tag
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            PRERELEASE=false
            IS_LATEST=true
          else
            TAG_NAME="latest"
            PRERELEASE=false
            IS_LATEST=false
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "is_latest=$IS_LATEST" >> $GITHUB_OUTPUT

      - name: Create ZIP archives
        run: |
          mkdir -p dist
          # Package each skill directory individually
          for skill_dir in skills/*/; do
            if [ -d "$skill_dir" ]; then
              skill_name=$(basename "$skill_dir")
              echo "Packaging $skill_name..."
              # Change to the skill directory to ensure SKILL.md is at the root of the zip archive
              cd "$skill_dir"
              zip -r "../../dist/${skill_name}.zip" . -x "*.gitkeep"
              cd - > /dev/null
            fi
          done

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag_name }}
          name: ${{ steps.get_tag.outputs.tag_name == 'latest' && 'Latest Release Build' || steps.get_tag.outputs.tag_name }}
          files: dist/*.zip
          draft: false
          prerelease: ${{ steps.get_tag.outputs.prerelease == 'true' }}
          make_latest: ${{ steps.get_tag.outputs.is_latest }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
